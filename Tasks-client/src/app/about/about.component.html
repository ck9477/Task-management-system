<div class="about-page">
  <mat-card class="about-card animate-fade-in-up">
    <mat-card-header>
      <div class="header-content">
        <span class="material-icons header-icon">info</span>
        <mat-card-title>אודות האתר</mat-card-title>
      </div>
    </mat-card-header>

    <mat-card-content>
      <p class="lead">
        אתר זה נכתב על ידי <strong>{{ developerName }}</strong>
      </p>

      <div class="tech-section">
        <h3>צד שרת</h3>
        <div class="tech-tags">
          <span class="tech-tag">
            <span class="material-icons">dns</span> Node.js
          </span>
          <span class="tech-tag">
            <span class="material-icons">storage</span> SQL Server
          </span>
        </div>
      </div>

      <div class="tech-section">
        <h3>צד לקוח</h3>
        <div class="tech-tags">
          <span class="tech-tag">
            <span class="material-icons">code</span> Angular 19
          </span>
          <span class="tech-tag">
            <span class="material-icons">design_services</span> Angular Material
          </span>
          <span class="tech-tag">
            <span class="material-icons">data_object</span> RxJS
          </span>
        </div>
      </div>

      <mat-divider></mat-divider>

      <div class="clock-section">
        <span class="material-icons clock-icon">schedule</span>
        <p>השעה הנוכחית: <strong>{{ currentTime }}</strong></p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
