<div class="users-page">
  <!-- Toolbar -->
  <div class="users-toolbar">
    <h2 class="page-title">משתמשים</h2>
    <button class="btn btn-sm btn-accent" (click)="addUser()">
      <span class="material-icons">person_add</span>
      <span>משתמש חדש</span>
    </button>
  </div>

  <!-- Table -->
  <div class="table-container">
    <mat-table [dataSource]="usersList || []" class="custom-table">
      <ng-container *ngFor="let column of columns" [matColumnDef]="column">
        <mat-header-cell *matHeaderCellDef>
          <span>{{ column | toColumnName }}</span>
        </mat-header-cell>

        <mat-cell *matCellDef="let element">
          @if (column === 'roleId') {
            <span class="role-badge" [class.role-manager]="element[column] === theRole.manager">
              {{ element[column] | roleText }}
            </span>
          }
          @else if (column !== 'roleId' && !iconColumns.includes(column)) {
            <span>{{ element[column] }}</span>
          }
          @if (column === 'delete') {
            <button class="btn-icon-delete"
                    [disabled]="user.roleId !== theRole.manager"
                    (click)="deleteUser(element)">
              <span class="material-icons">delete</span>
            </button>
          }
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: columns;"></mat-row>
    </mat-table>
  </div>
</div>
