<form [formGroup]="userForm" class="dialog-form">
  <div class="form-header">
    <span class="material-icons">person_add</span>
    <h3>משתמש חדש</h3>
  </div>

  <div class="form-body">
    <div class="form-group">
      <label class="form-label">שם משתמש</label>
      <input class="form-input" type="text" formControlName="userName" placeholder="הכנס שם משתמש" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">טלפון</label>
        <input class="form-input" type="text" formControlName="phone" placeholder="הכנס מספר טלפון" />
      </div>

      <div class="form-group">
        <label class="form-label">אימייל</label>
        <input class="form-input" type="text" formControlName="email" placeholder="הכנס אימייל" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">סיסמה</label>
        <input class="form-input" type="password" formControlName="password" placeholder="הכנס סיסמה" />
      </div>

      <div class="form-group">
        <label class="form-label">תפקיד</label>
        <select class="form-select" formControlName="roleId">
          <option [ngValue]="theRoleEnum.manager">מנהל</option>
          <option [ngValue]="theRoleEnum.standard">משתמש רגיל</option>
        </select>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn btn-accent" [disabled]="userForm.invalid" (click)="save()">
      <span>שמור</span>
    </button>
    <button class="btn btn-ghost" (click)="cancel()">בטל</button>
  </div>
</form>
