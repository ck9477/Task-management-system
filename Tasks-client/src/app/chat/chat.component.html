<!-- Floating chat button -->
<button class="chat-fab"
  *ngIf="!open"
  (click)="openChat()"
  [matTooltip]="'פתח צ\'אט'">
  <span class="material-icons">chat</span>
  <span class="fab-pulse"></span>
</button>

<!-- Chat window -->
<div class="chat-window" *ngIf="open">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="material-icons">support_agent</span>
      <div>
        <h4>צ׳אט תמיכה</h4>
        <span class="online-badge">מחובר</span>
      </div>
    </div>
    <button class="chat-close" (click)="closeChat()">
      <span class="material-icons">close</span>
    </button>
  </div>

  <!-- Messages area -->
  <div class="chat-messages" #scrollContainer>
    @for (msg of messages; track msg) {
      <div class="message-wrapper" [class.message-own]="msg.sender">
        <div class="message-sender" *ngIf="msg.sender">
          {{ msg.sender }}
        </div>
        <div class="message-bubble" [class.bubble-own]="msg.sender"
             [innerHTML]="msg.text | chatMessage">
        </div>
      </div>
    }
  </div>

  <!-- Input area -->
  <div class="chat-input-area">
    <input
      class="chat-input"
      placeholder="הקלד הודעה..."
      [(ngModel)]="input"
      (keydown.enter)="send()"
    />
    <button class="chat-send" (click)="send()">
      <span class="material-icons">send</span>
    </button>
  </div>
</div>
